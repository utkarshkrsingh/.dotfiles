# ----------------------------
# 🌙 TOKYO NIGHT SPLIT PROMPT
# ----------------------------


add_newline = false

format = """
$line_break\
$username$directory$git_branch$git_status$time\
$line_break\
$character
"""

# ----------------------------
# 👤 USER
# ----------------------------
[username]
show_always = true
format = "[ $user ]($style)"
style_user = "fg:#7dcfff bold"

# ----------------------------
# 📁 DIRECTORY
# ----------------------------
[directory]
format = "[ $path ]($style)"
style = "fg:#7aa2f7"
truncation_length = 3
truncate_to_repo = true

# ----------------------------
# 🌱 GIT
# ----------------------------
[git_branch]
symbol = ""
format = "[$symbol $branch ]($style)"
style = "fg:#bb9af7 bold"

[git_status]
format = "[$all_status$ahead_behind ]($style)"
style = "fg:#f7768e"

# ----------------------------
# 🕒 TIME
# ----------------------------
[time]
disabled = false
time_format = "%H:%M"
format = "[ $time ]($style)"
style = "fg:#9ece6a"

# ----------------------------
# ❯ PROMPT LINE
# ----------------------------
[character]
success_symbol = "[λ](bold #7dcfff)"
error_symbol = "[λ](bold #f7768e)"
