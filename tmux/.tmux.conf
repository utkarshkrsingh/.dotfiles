##### --- TERMINAL & CORE --- #####

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

set -g status-position top
set -g mouse on
set -g focus-events on
set -g history-limit 100000

# Performance
set -sg escape-time 0
set -g repeat-time 300

# Better indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

##### --- KEYBINDINGS --- #####

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Vim-style
set -g mode-keys vi

# Pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Smart vim-aware navigation
bind -n C-h if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-h" "select-pane -L"
bind -n C-l if-shell "ps -o comm= -t '#{pane_tty}' | grep -iqE 'vim|nvim'" "send-keys C-l" "select-pane -R"

# Window switching
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Splits (keep cwd)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Safe kill
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind & confirm-before -p "Kill window? (y/n)" kill-window

##### --- CLIPBOARD --- #####

set -g set-clipboard on

# macOS
if-shell "command -v pbcopy >/dev/null" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"

# Linux (X11)
if-shell "command -v xclip >/dev/null" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard'"

# Linux (Wayland)
if-shell "command -v wl-copy >/dev/null" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'"

bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel

##### --- STATUS BAR --- #####

set -g status-interval 5
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 150

# Clean separator
set -g @sep " | "

### LEFT: session ONLY (no hostname)
set -g status-left ""
set -ag status-left "#[fg=#89b4fa,bold]#S"

### WINDOWS
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "

### RIGHT: clean structured info
set -g status-right ""

# Shell
set -ag status-right "#[fg=#a6e3a1]#{pane_current_command}"
set -ag status-right "#[fg=#6c7086]#{@sep}"

# Directory (short name)
set -ag status-right "#[fg=#89dceb]#{b:pane_current_path}"
set -ag status-right "#[fg=#6c7086]#{@sep}"

# User
set -ag status-right "#[fg=#f9e2af]#(whoami)"
set -ag status-right "#[fg=#6c7086]#{@sep}"

# Time
set -ag status-right "#[fg=#fab387] %H:%M"

##### --- CATPPUCCIN --- #####

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "simple"

# Disable hostname module explicitly
set -g @catppuccin_status_host "off"

# Transparent style
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_current_background "none"
set -g @catppuccin_window_status_background "none"

##### --- PLUGINS --- #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

##### --- TPM INIT --- #####

run '~/.tmux/plugins/tpm/tpm'
