# vim:fileencoding=utf-8:foldmethod=marker

#: Font Family &Size
font_family FantasqueSansM Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 15
disable_ligatures never

#: Tokyo Night color scheme
foreground            #c0caf5
background            #1a1b26

#: Transparency (optional)
background_opacity    1.0
dynamic_background_opacity yes

#: Selection
selection_foreground  #1a1b26
selection_background  #7aa2f7

#: Cursor
cursor                #c0caf5
cursor_text_color     #1a1b26
cursor_shape beam
cursor_beam_thickness 1.5

#: URL color
url_color             #73daca

#: Basic colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

#: Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

#: Dim colors (optional, fallback if not set)
color16 #ff9e64
color17 #db4b4b

#: Tab bar (optional styling)
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #292e42

#: Window border
active_border_color     #7aa2f7
inactive_border_color   #414868

#: Window decoration
hide_window_decorations titlebar-only
window_padding_width 15
window_margin_wigth 8
